name: Deploy to UAT

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:

  deploy:

    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          echo y | sf plugins install sfdx-git-delta
          sf version

      - name: Authenticate to UAT
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth.txt
          sf org login sfdx-url \
            --sfdx-url-file auth.txt \
            --alias UAT

      - name: Generate Delta Package
        run: |
          mkdir -p delta

          sf sgd source delta \
            --from origin/main \
            --to HEAD \
            --generate-delta \
            --output-dir delta

      - name: Show Generated Package
        run: |
          echo "===== package.xml ====="
          cat delta/package/package.xml

          echo ""
          echo "===== destructiveChanges.xml ====="

          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            cat delta/destructiveChanges/destructiveChanges.xml
          else
            echo "No destructive changes."
          fi
      
      - name: Deploy Delta
        run: |
          if grep -q "<types>" delta/package/package.xml; then
            echo "Salesforce metadata found. Starting deployment..."

            sf project deploy start \
              --target-org UAT \
              --manifest delta/package/package.xml \
              --test-level RunRelevantTests \
              --wait 120
          else
            echo "No Salesforce metadata changes detected."
            echo "Skipping deployment."
          fi