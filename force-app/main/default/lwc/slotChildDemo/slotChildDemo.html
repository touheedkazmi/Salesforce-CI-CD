<template>
    <div>What is your name?</div>
    <!-- Slot tells something can come from the parent -->
    <!-- <div><slot></slot></div> Unnamed slot - when used we wont be able to differentiate as it will render everything from parent -->
    <div><slot name="first"></slot></div> <!-- Named Slot- slots with name attribute, important to place slot whereever needed from parent -->
    <div>What is your age?</div>
    <div><slot name="second"></slot></div>
    <footer class="slds-card__footer slds-hide">
        <slot name="footer" onslotchange={handleFooterChange}></slot>
    </footer>
</template>
