<template>
    <lightning-card title="Render Multiple Template" icon-name="custom:custom14">
         <div class="slds-m-around_medium">
            <h2 class="slds-text-heading_medium slds-m-bottom_medium">SignIn form</h2>
            <lightning-input type="email" label="Email Address"></lightning-input>
            <lightning-input type="password" label="Password"></lightning-input>
            <lightning-button 
            variant="destructive" 
            label="back" 
            title="back" 
            onclick={handleClick}
            class="slds-m-left_small"> </lightning-button>
             <lightning-button 
            variant="success" 
            label="SignIn" 
            title="SignIn" 
            onclick={submitHandler}
            class="slds-m-left_small"> </lightning-button>
         </div>
    </lightning-card>
</template>
