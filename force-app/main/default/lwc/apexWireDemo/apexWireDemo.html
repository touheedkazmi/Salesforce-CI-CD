<template>
    <lightning-card title="Apex wire to property demo">
        <div class="slds-p-around_medium">
            <template if:true={accounts.data}>
                <template for:each={accounts.data} for:item="account">
                    <div class="slds-box slds-box_xx-small slds-theme_default" key={account.Id}>
                        <p><strong>Account Id:</strong> {account.Id}</p>
                        <p><strong>Account Name:</strong> {account.Name}</p>
                        <p><strong>Account Industry:</strong> {account.Industry}</p>
                        <p><strong>Account Type:</strong> {account.Type}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
    <lightning-card title="Apex wire to function demo">
        <div class="slds-p-around_medium">
            <template if:true={accountsList}>
                <template for:each={accountsList} for:item="account">
                    <div class="slds-box slds-box_xx-small slds-theme_default" key={account.Id}>
                        <p><strong>Account Id:</strong> {account.Id}</p>
                        <p><strong>Account Name:</strong> {account.Name}</p>
                        <p><strong>Account Industry:</strong> {account.Industry}</p>
                        <p><strong>Account Type:</strong> {account.Type}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
