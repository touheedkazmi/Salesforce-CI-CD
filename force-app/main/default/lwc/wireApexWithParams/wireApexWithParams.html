<template>
    <lightning-card title="Wire demo with Params">
        <div class="slds-p-around_medium">
            <lightning-combobox
                name="type"
                label="Choose Account Type"
                value={selectedType}
                options={typeOptions}
                placeholder="Select Account Type"
                onchange={typeHandler}>
            </lightning-combobox>
            <template if:true={filteredAccounts.data}>
                <template for:each={filteredAccounts.data} for:item="account">
                    <div class="slds-box slds-box_xx-small slds-theme_default" key={account.Id}>
                        <p><strong>Account Id:</strong> {account.Id}</p>
                        <p><strong>Account Name:</strong> {account.Name}</p>
                        <p><strong>Account Industry:</strong> {account.Industry}</p>
                        <p><strong>Account Type:</strong> {account.Type}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
