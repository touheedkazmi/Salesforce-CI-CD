<template>
    <lightning-card title="Base Record Form Demo" icon-name="standard:account">
        <div class="slds-m-around_medium">
            <lightning-record-form
                object-api-name={objectApiName}
                fields={fields}
                mode="edit"
                onsuccess={successHandler}>
            </lightning-record-form>
        </div>
    </lightning-card>

    <lightning-card title="Base Record Form Demo - Display Record" icon-name="standard:account">
        <div class="slds-m-around_medium">
            <lightning-record-form
                object-api-name={objectApiName}
                record-id= "001NS00002MCROeYAP"
                fields={fields}
                >
            </lightning-record-form>
        </div>
    </lightning-card>

    <lightning-card title="Base Record Form Demo - Display Record in readonly mode" icon-name="standard:account">
        <div class="slds-m-around_medium">
            <lightning-record-form
                object-api-name={objectApiName}
                record-id= "001NS00002MCROeYAP"
                fields={fields}
                mode="readonly">
            </lightning-record-form>
        </div>
    </lightning-card>

    <lightning-card title="Base Record Form Demo - Edit Record" icon-name="standard:account">
        <div class="slds-m-around_medium">
            <lightning-record-form
                object-api-name={objectApiName}
                record-id= "001NS00002MCROeYAP"
                fields={fields}
                mode="edit"
                columns="2">
            </lightning-record-form>
        </div>
    </lightning-card>

    <lightning-card title="Base Record Form Demo - Edit Record with layout" icon-name="standard:account">
        <div class="slds-m-around_medium">
            <lightning-record-form
                object-api-name= {objectApiName}
                record-id= {recordId}
                mode="edit"
                columns="2"
                layout-type="Compact">
            </lightning-record-form>
        </div>
    </lightning-card>
</template>
