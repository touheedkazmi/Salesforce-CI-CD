<template>
    <lightning-card title="conditional rendering">
        <div class="slds-m-around_medium">
            <lightning-button variant="brand" label="Show Data" title="Show Data" onclick={handleClick} class="slds-m-left_small"></lightning-button>
            
            <template if:true={isVisible}>
                <div>Welcome to zero to hero series</div>
            </template>
            <template if:false={isVisible}>
                <div>You can't see the data, Please click the button</div>
            </template>

            <lightning-input type="text" label="Type hello to see the data" onkeyup={changeHandler}></lightning-input>
            <template if:true={match}>
                <div>Hurray! you have typed correctly</div>
            </template>           
        </div>
    </lightning-card>
</template>
