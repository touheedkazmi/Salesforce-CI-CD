<template>
    <lightning-card title="Apex Imperative with Parameters Demo">
        <div class="slds-m-around_medium">
            <lightning-input label="Search Accounts" 
            onchange={searchKeyChangeHandler}
            value={searchKey}></lightning-input>

        </div>
        <template if:true={accounts}>
            <template for:each={accounts} for:item="account">
                <div class="slds-box slds-box_xx-small slds-m-around_xx-small slds-theme_alert-texture" key={account.Id}>
                    <p >Name - {account.Name}</p>
                    <p >Type - {account.Type}</p>
                    <p >Industry - {account.Industry}</p>
                </div>
            </template>
        </template>
    </lightning-card>
</template>
